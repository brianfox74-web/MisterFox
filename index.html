<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MisterFox</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --fg: #f0ede6;
      --accent: #d4501a;
      --mid: #1a1a1a;
      --subtle: #3a3a3a;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: 'DM Mono', monospace;
      overflow: hidden;
      cursor: none;
    }

    /* Custom cursor */
    .cursor {
      position: fixed;
      width: 12px;
      height: 12px;
      background: var(--accent);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: transform 0.1s ease, width 0.2s ease, height 0.2s ease;
      mix-blend-mode: difference;
    }
    .cursor.grow {
      width: 40px;
      height: 40px;
    }

    /* Noise overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      pointer-events: none;
      z-index: 100;
      opacity: 0.4;
    }

    /* Grid lines */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 1;
    }

    /* Layout */
    .page {
      position: relative;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 2.5rem 3rem;
      z-index: 10;
    }

    /* Top bar */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.2s forwards;
    }

    .tag {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--subtle);
      line-height: 1.6;
    }

    .tag span {
      color: var(--accent);
    }

    .status-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      margin-right: 6px;
      animation: pulse 2s infinite;
    }

    /* Hero */
    .hero {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      width: 100%;
    }

    .hero-eyebrow {
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--subtle);
      margin-bottom: 1rem;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.5s forwards;
    }

    .hero-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(6rem, 16vw, 14rem);
      line-height: 0.9;
      letter-spacing: -0.01em;
      color: var(--fg);
      opacity: 0;
      animation: fadeUp 1s ease 0.6s forwards;
      position: relative;
      display: inline-block;
    }

    .hero-name .fox-accent {
      color: var(--accent);
      position: relative;
    }

    /* Animated underline on FOX */
    .hero-name .fox-accent::after {
      content: '';
      position: absolute;
      bottom: 8px;
      left: 0;
      width: 0;
      height: 4px;
      background: var(--accent);
      animation: lineGrow 0.6s ease 1.4s forwards;
    }

    .hero-sub {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--subtle);
      margin-top: 2rem;
      opacity: 0;
      animation: fadeUp 0.8s ease 1s forwards;
    }

    /* Diagonal accent line */
    .diagonal {
      position: fixed;
      top: 0;
      right: 18%;
      width: 1px;
      height: 0;
      background: linear-gradient(to bottom, transparent, var(--accent), transparent);
      animation: lineDown 1.2s ease 0.3s forwards;
      z-index: 5;
    }

    /* Bottom bar */
    .bottom-bar {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      opacity: 0;
      animation: fadeUp 0.8s ease 1.1s forwards;
    }

    .nav-links {
      display: flex;
      gap: 2.5rem;
      list-style: none;
    }

    .nav-links a {
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--subtle);
      text-decoration: none;
      transition: color 0.2s;
      position: relative;
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 1px;
      background: var(--accent);
      transition: width 0.3s ease;
    }

    .nav-links a:hover {
      color: var(--fg);
    }

    .nav-links a:hover::after {
      width: 100%;
    }

    .scroll-hint {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--subtle);
      writing-mode: vertical-rl;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .scroll-hint::before {
      content: '';
      display: block;
      width: 1px;
      height: 40px;
      background: var(--subtle);
    }

    /* Large background text */
    .bg-text {
      position: fixed;
      bottom: -2rem;
      left: -1rem;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22vw;
      color: transparent;
      -webkit-text-stroke: 1px rgba(255,255,255,0.03);
      pointer-events: none;
      z-index: 2;
      user-select: none;
      white-space: nowrap;
    }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes lineDown {
      from { height: 0; opacity: 0; }
      to   { height: 100vh; opacity: 1; }
    }

    @keyframes lineGrow {
      to { width: 100%; }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>

  <div class="cursor" id="cursor"></div>
  <div class="diagonal"></div>
  <div class="bg-text">FOX</div>

  <div class="page">

    <div class="top-bar">
      <div class="tag">
        <span class="status-dot"></span><span>Available for bookings</span><br>
        Est. — UK
      </div>
      <div class="tag" style="text-align:right;">
        DJ / Producer<br>
        <span>Electronic · House · Bass</span>
      </div>
    </div>

    <div class="hero">
      <p class="hero-eyebrow">The sound of</p>
      <h1 class="hero-name">
        Mister<span class="fox-accent">Fox</span>
      </h1>
      <p class="hero-sub">DJ · Live Sets · Events</p>
    </div>

    <div class="bottom-bar">
      <ul class="nav-links">
        <li><a href="#">About</a></li>
        <li><a href="#">Music</a></li>
        <li><a href="#">Events</a></li>
        <li><a href="#">Book</a></li>
      </ul>
      <div class="scroll-hint">Scroll</div>
    </div>

  </div>

  <script>
    const cursor = document.getElementById('cursor');
    document.addEventListener('mousemove', e => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top = e.clientY + 'px';
    });
    document.querySelectorAll('a, button').forEach(el => {
      el.addEventListener('mouseenter', () => cursor.classList.add('grow'));
      el.addEventListener('mouseleave', () => cursor.classList.remove('grow'));
    });
  </script>

</body>
</html>
